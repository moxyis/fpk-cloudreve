name: 多架构 fpk 自动打包

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "true=只打包不推送，false=生产推送"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: '0 0 * * *'

env:
  DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
  APP_ID: "fpk-cloudreve"
  APP_NAME: "Cloudreve"
  BASE_DIR: "Cloudreve"
  UPSTREAM_REPO: "cloudreve/Cloudreve"
  BINARY_NAME: "cloudreve"
  APP_TYPE: "GitHub"
  FNPACK_VERSION: "1.2.1"
  FNPACK_PLATFORM: "linux-amd64"
  FNPACK_BASE_URL: "https://static2.fnnas.com/fnpack"
  PACKAGE_DIR: "/tmp/fpk-packages"
  FNDEPOT_REPO: "moxyis/FnDepot"
  FNDEPOT_BRANCH: "main"
  FNDEPOT_APP_DIR: "fpk-cloudreve"
  ARCH_LIST: "x86 arm"
  ASSET_x86: "linux_amd64.tar.gz"
  ASSET_arm: "linux_arm64.tar.gz"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 初始化
        id: init
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          BUILD_TIME=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: 3. 读取本地版本
        id: local_version
        run: |
          mkdir -p "$BASE_DIR/app/bin" "$BASE_DIR/app/conf"
          MANIFEST_PATH="$BASE_DIR/manifest"
          [ ! -f "$MANIFEST_PATH" ] && echo -e "version: 0.0.0\nplatform: x86" > "$MANIFEST_PATH"
          LOCAL_VERSION=$(sed -n 's/^[[:space:]]*version[[:space:]]*[:=][[:space:]]*//p' "$MANIFEST_PATH" | head -n1 | tr -d '"' | tr -d "'" | xargs)
          [ -z "$LOCAL_VERSION" ] && LOCAL_VERSION="0.0.0"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

      - name: 4. 获取官方最新版本
        id: remote_version
        run: |
          REMOTE_VERSION=$(curl -sSL https://api.github.com/repos/$UPSTREAM_REPO/releases/latest | jq -r '.tag_name' | tr -d 'v' | xargs)
          [ -z "$REMOTE_VERSION" ] && { echo "❌ 获取远程版本失败"; exit 1; }
          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"

      - name: 5. 判断是否需要打包
        id: compare
        run: |
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.local_version.outputs.local_version }}" = "${{ steps.remote_version.outputs.remote_version }}" ]; then
            echo "need_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 6. 下载并安装 fnpack
        if: steps.compare.outputs.need_update == 'true'
        run: |
          curl -SL -o /tmp/fnpack "${FNPACK_BASE_URL}/fnpack-${FNPACK_VERSION}-${FNPACK_PLATFORM}"
          install -m 755 /tmp/fnpack /usr/local/bin/fnpack
          fnpack --help | head -n 20 || true

      - name: 7. 多架构打包
        if: steps.compare.outputs.need_update == 'true'
        id: build_packages
        run: |
          set -euo pipefail
          mkdir -p "$PACKAGE_DIR"
          RELEASE_FILES=""

          RELEASE_DATA=$(curl -sSL https://api.github.com/repos/$UPSTREAM_REPO/releases/latest)

          get_asset_match() {
            local arch="$1"
            local varname="ASSET_${arch}"
            echo "${!varname}"
          }

          fix_manifest() {
            local dir="$1"
            local arch="$2"
            sed -i -E -e "s/(^[[:space:]]*platform[[:space:]]*[:=][[:space:]]*).*/\1${arch}/" \
                      -e "s/(^[[:space:]]*version[[:space:]]*[:=][[:space:]]*).*/\1${{ steps.remote_version.outputs.remote_version }}/" "$dir/manifest"
          }

          download_binary() {
            local arch="$1"
            local asset="$2"
            local bin_dir="$3"
            local download_url
            download_url=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name | contains(\"$asset\")) | .browser_download_url" | head -n1)
            mkdir -p "$bin_dir"
            curl -SL -o "/tmp/${arch}.tar.gz" "$download_url"
            tar -zxf "/tmp/${arch}.tar.gz" -C "$bin_dir/../"
          }

          build_one_arch() {
            local arch="$1"
            local asset=$(get_asset_match "$arch")
            local build_dir="$PACKAGE_DIR/$arch/$APP_ID"
            rm -rf "$(dirname "$build_dir")"
            mkdir -p "$(dirname "$build_dir")"
            cp -r "$BASE_DIR" "$build_dir"
            mkdir -p "$build_dir/app/bin" "$build_dir/app/conf"

            fix_manifest "$build_dir" "$arch"
            download_binary "$arch" "$asset" "$build_dir/app/bin"

            fnpack build --directory "$PACKAGE_DIR/$arch/$APP_ID"

            local fpk_file
            fpk_file=$(find "$PACKAGE_DIR/$arch" -maxdepth 1 -type f -name "*.fpk" | head -n1)
            mv "$fpk_file" "$PACKAGE_DIR/$arch/${APP_ID}.fpk"
            cp "$PACKAGE_DIR/$arch/${APP_ID}.fpk" "$PACKAGE_DIR/${APP_ID}_${arch}_${{ steps.remote_version.outputs.remote_version }}.fpk"
            RELEASE_FILES+="$PACKAGE_DIR/${APP_ID}_${arch}_${{ steps.remote_version.outputs.remote_version }}.fpk"$'\n'
          }

          for ARCH in $ARCH_LIST; do build_one_arch "$ARCH"; done

          echo "release_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"

      - name: 8. Debug 模式验证
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'true'
        run: |
          find "$PACKAGE_DIR" -type f -name "*.fpk"
          sha256sum "$PACKAGE_DIR"/*/*.fpk
          sha256sum "$PACKAGE_DIR"/*.fpk

      - name: 9. 克隆 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: git clone "https://${{ secrets.FnDepot_PAT }}@github.com/${FNDEPOT_REPO}.git" /tmp/FnDepot

      - name: 10. 推送 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          mkdir -p "/tmp/FnDepot/$FNDEPOT_APP_DIR"
          for ARCH in $ARCH_LIST; do
            cp "$PACKAGE_DIR/$ARCH/${APP_ID}.fpk" "/tmp/FnDepot/$FNDEPOT_APP_DIR/${APP_ID}_${ARCH}.fpk"
          done

      - name: 11. 更新 fnpack.json
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          JSON_FILE="/tmp/FnDepot/fnpack.json"
          [ ! -f "$JSON_FILE" ] && echo '{}' > "$JSON_FILE"
          jq --arg app "$APP_ID" --arg ver "${{ steps.remote_version.outputs.remote_version }}" '.[$app] = (.[$app] // {}) | .[$app].version = $ver' "$JSON_FILE" > "$JSON_FILE.tmp"
          mv "$JSON_FILE.tmp" "$JSON_FILE"

      - name: 12. 更新 README
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          README_FILE="/tmp/FnDepot/README.md"
          NEW_ROW="| **${APP_NAME}** | ${{ steps.remote_version.outputs.remote_version }} | https://github.com/${UPSTREAM_REPO} | ${APP_TYPE} |"
          if [ ! -f "$README_FILE" ]; then
            echo -e "# FnDepot\n\n| 应用名称 | 版本号 | 来源 | 类型 |\n|---|---|---|---|\n$NEW_ROW" > "$README_FILE"
          elif grep -qF "**${APP_NAME}**" "$README_FILE"; then
            awk -v row="$NEW_ROW" '$0 ~ "\\*\\*" app "\\*\\*" {print row; next} {print}' "$README_FILE" > "$README_FILE.tmp"
            mv "$README_FILE.tmp" "$README_FILE"
          else
            echo -e "\n| 应用名称 | 版本号 | 来源 | 类型 |\n|---|---|---|---|\n$NEW_ROW" >> "$README_FILE"
          fi

      - name: 13. 提交 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          cd /tmp/FnDepot
          git add "$FNDEPOT_APP_DIR/" fnpack.json README.md
          git diff --cached --quiet || git commit -m "chore: 更新${APP_NAME}多架构版本至${{ steps.remote_version.outputs.remote_version }}" && git push origin "$FNDEPOT_BRANCH"

      - name: 14. 创建 Release
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        uses: softprops/action-gh-release@v3
        with:
          overwrite_files: true
          tag_name: "${APP_NAME}-v${{ steps.remote_version.outputs.remote_version }}"
          name: "${APP_NAME} v${{ steps.remote_version.outputs.remote_version }}（多架构）"
          files: ${{ steps.build_packages.outputs.release_files }}
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 15. 更新 manifest
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          sed -i -E "s/(^[[:space:]]*version[[:space:]]*[:=][[:space:]]*).*/\1${{ steps.remote_version.outputs.remote_version }}/" "$BASE_DIR/manifest"
          git add "$BASE_DIR/manifest"
          git diff --cached --quiet || git commit -m "chore: 更新基础版本号至${{ steps.remote_version.outputs.remote_version }}" && git push origin HEAD:${{ github.ref_name }}
