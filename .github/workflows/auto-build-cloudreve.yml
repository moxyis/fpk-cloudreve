name: 多架构 fpk 自动打包

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "true=只打包不推送，false=生产推送"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}

  APP_ID: "fpk-cloudreve"
  APP_NAME: "Cloudreve"
  BASE_DIR: "Cloudreve"
  UPSTREAM_REPO: "cloudreve/Cloudreve"
  BINARY_NAME: "cloudreve"
  APP_TYPE: "GitHub"

  FNPACK_VERSION: "1.2.1"
  FNPACK_PLATFORM: "linux-amd64"
  FNPACK_BASE_URL: "https://static2.fnnas.com/fnpack"

  PACKAGE_DIR: "/tmp/fpk-packages"

  FNDEPOT_REPO: "moxyis/FnDepot"
  FNDEPOT_BRANCH: "main"
  FNDEPOT_APP_DIR: "fpk-cloudreve"

  ARCH_LIST: "x86 arm"
  ASSET_x86: "linux_amd64.tar.gz"
  ASSET_arm: "linux_arm64.tar.gz"

jobs:
  build-multi-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 初始化环境
        id: init
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          BUILD_TIME=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: 3. 读取本地版本
        id: local_version
        run: |
          mkdir -p "$BASE_DIR/app/bin" "$BASE_DIR/app/conf"
          MANIFEST_PATH="$BASE_DIR/manifest"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "version: 0.0.0" > "$MANIFEST_PATH"
            echo "platform: x86" >> "$MANIFEST_PATH"
          fi
          LOCAL_VERSION=$(sed -n 's/^[[:space:]]*version[[:space:]]*[:=][[:space:]]*//p' "$MANIFEST_PATH" | head -n1 | tr -d '"' | tr -d "'" | xargs)
          [ -z "$LOCAL_VERSION" ] && LOCAL_VERSION="0.0.0"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

      - name: 4. 获取官方最新版本
        id: remote_version
        run: |
          REMOTE_VERSION=$(curl -sSL -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$UPSTREAM_REPO/releases/latest" | jq -r '.tag_name' | tr -d 'v' | xargs)
          [ -z "$REMOTE_VERSION" ] && { echo "❌ 获取远程版本失败"; exit 1; }
          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"

      - name: 5. 判断是否需要打包
        id: compare
        run: |
          LOCAL_VERSION="${{ steps.local_version.outputs.local_version }}"
          REMOTE_VERSION="${{ steps.remote_version.outputs.remote_version }}"
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "need_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 6. 下载并安装 fnpack
        if: steps.compare.outputs.need_update == 'true'
        run: |
          FNPACK_URL="${FNPACK_BASE_URL}/fnpack-${FNPACK_VERSION}-${FNPACK_PLATFORM}"
          curl -SL -o /tmp/fnpack "$FNPACK_URL"
          install -m 755 /tmp/fnpack /usr/local/bin/fnpack

      - name: 7. 多架构打包
        if: steps.compare.outputs.need_update == 'true'
        id: build_packages
        run: |
          REMOTE_VERSION="${{ steps.remote_version.outputs.remote_version }}"
          mkdir -p "$PACKAGE_DIR"
          RELEASE_FILES=""

          get_asset_match() {
            local arch="$1"
            echo "${!ARCH_$arch}"
          }

          fix_manifest() {
            local dir="$1"; local arch="$2"
            sed -i -E -e "s/(^[[:space:]]*platform[[:space:]]*[:=][[:space:]]*).*/\1${arch}/" \
                      -e "s/(^[[:space:]]*version[[:space:]]*[:=][[:space:]]*).*/\1${REMOTE_VERSION}/" "$dir/manifest"
          }

          download_binary() {
            local arch="$1"; local asset_match="$2"; local bin_dir="$3"
            local download_url
            download_url=$(curl -sSL https://api.github.com/repos/$UPSTREAM_REPO/releases/latest | jq -r ".assets[] | select(.name | contains(\"$asset_match\")) | .browser_download_url" | head -n1)
            mkdir -p "$bin_dir"
            curl -SL -o "/tmp/${arch}.tar.gz" "$download_url"
            tar -zxf "/tmp/${arch}.tar.gz" -C "$bin_dir/../"
          }

          build_one_arch() {
            local arch="$1"
            local asset_match="$2"

            BUILD_PARENT="/tmp/fpk-build-${arch}"
            BUILD_DIR="$BUILD_PARENT/${APP_ID}"
            BIN_DIR="$BUILD_DIR/app/bin"
            ARCH_PACKAGE_DIR="$PACKAGE_DIR/$arch"

            rm -rf "$BUILD_PARENT" "$ARCH_PACKAGE_DIR"
            mkdir -p "$BUILD_PARENT" "$ARCH_PACKAGE_DIR"

            cp -r "$BASE_DIR" "$BUILD_DIR"
            mkdir -p "$BIN_DIR" "$BUILD_DIR/app/conf"

            fix_manifest "$BUILD_DIR" "$arch"
            download_binary "$arch" "$asset_match" "$BIN_DIR"

            cd "$BUILD_PARENT"
            fnpack build -d "$APP_ID"

            local fpk_file
            fpk_file=$(find "$BUILD_PARENT" -maxdepth 1 -type f -name "*.fpk" | head -n1)

            mv "$fpk_file" "$ARCH_PACKAGE_DIR/${APP_ID}-${arch}.fpk"
            cp "$ARCH_PACKAGE_DIR/${APP_ID}-${arch}.fpk" "$PACKAGE_DIR/${APP_ID}-${arch}-v${REMOTE_VERSION}.fpk"

            RELEASE_FILES+="$PACKAGE_DIR/${APP_ID}-${arch}-v${REMOTE_VERSION}.fpk"$'\n'
            cd -
          }

          for ARCH in $ARCH_LIST; do
            build_one_arch "$ARCH" "linux_${ARCH}"
          done

          echo "release_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"

      - name: 8. Debug 模式验证
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'true'
        run: |
          find "$PACKAGE_DIR" -type f -name "*.fpk"
          sha256sum "$PACKAGE_DIR"/*/*.fpk

      - name: 9. 克隆 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: git clone "https://${{ secrets.FnDepot_PAT }}@github.com/${FNDEPOT_REPO}.git" /tmp/FnDepot

      - name: 10. 复制 fpk 到 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          for ARCH in $ARCH_LIST; do
            cp "$PACKAGE_DIR/$ARCH/${APP_ID}-${ARCH}.fpk" "/tmp/FnDepot/$FNDEPOT_APP_DIR/${APP_ID}-${ARCH}.fpk"
          done

      - name: 11. 更新 fnpack.json
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          JSON_FILE="/tmp/FnDepot/fnpack.json"
          [ ! -f "$JSON_FILE" ] && echo '{}' > "$JSON_FILE"
          jq --arg app "$APP_ID" --arg ver "$REMOTE_VERSION" '.[$app] = (.[$app] // {}) | .[$app].version = $ver' "$JSON_FILE" > "$JSON_FILE.tmp"
          mv "$JSON_FILE.tmp" "$JSON_FILE"

      - name: 12. 更新 README
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          README_FILE="/tmp/FnDepot/README.md"
          NEW_ROW="| **${APP_NAME}** | ${REMOTE_VERSION} | https://github.com/${UPSTREAM_REPO} | ${APP_TYPE} |"
          if [ ! -f "$README_FILE" ]; then
            echo -e "# FnDepot\n\n| 应用名称 | 版本号 | 来源 | 类型 |\n|---|---|---|---|\n$NEW_ROW" > "$README_FILE"
          elif grep -qF "**${APP_NAME}**" "$README_FILE"; then
            awk -v row="$NEW_ROW" '$0 ~ "\\*\\*fpk-cloudreve\\*\\*" {print row; next} {print}' "$README_FILE" > "$README_FILE.tmp"
            mv "$README_FILE.tmp" "$README_FILE"
          else
            echo -e "\n| 应用名称 | 版本号 | 来源 | 类型 |\n|---|---|---|---|\n$NEW_ROW" >> "$README_FILE"
          fi

      - name: 13. 提交 FnDepot 变更
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          cd /tmp/FnDepot
          git add "$FNDEPOT_APP_DIR/" fnpack.json README.md
          git diff --cached --quiet || git commit -m "chore: 更新${APP_NAME}多架构版本至${REMOTE_VERSION}" && git push origin "$FNDEPOT_BRANCH"

      - name: 14. 创建 GitHub Release
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        uses: softprops/action-gh-release@v3
        with:
          overwrite_files: true
          tag_name: "${APP_NAME}-v${REMOTE_VERSION}"
          name: "${APP_NAME} v${REMOTE_VERSION}（多架构）"
          files: ${{ steps.build_packages.outputs.release_files }}
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 15. 更新基础 manifest
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          sed -i -E "s/(^[[:space:]]*version[[:space:]]*[:=][[:space:]]*).*/\1${REMOTE_VERSION}/" "$BASE_DIR/manifest"
          git add "$BASE_DIR/manifest"
          git diff --cached --quiet || git commit -m "chore: 更新基础版本号至${REMOTE_VERSION}" && git push origin HEAD:${{ github.ref_name }}
